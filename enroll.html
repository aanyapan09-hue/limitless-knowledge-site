<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll | Limitless Knowledge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #9d73ff;
            --lilac: #E6E6FA; 
            --black: #1a1a1a;
            --yellow: #ffd966;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--lilac); color: var(--black); }

        /* --- Navigation --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: white; border-bottom: 3px solid var(--black);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; text-decoration: none; color: black; }
        .nav-links { display: flex; gap: 20px; list-style: none; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--black); font-weight: 700; font-size: 0.9rem; }
        .enroll-nav-btn {
            background: var(--purple); color: white !important; padding: 10px 25px;
            border-radius: 50px; border: 2px solid var(--black); box-shadow: 3px 3px 0px var(--black);
        }

        /* --- Layout --- */
        .enroll-container { display: flex; padding: 60px 10%; gap: 60px; flex-wrap: wrap; }
        .info-side { flex: 1; min-width: 300px; }
        .form-side { flex: 1; min-width: 350px; }

        /* --- Styled Form --- */
        .form-card {
            background: white; border: 4px solid var(--black); border-radius: 30px;
            padding: 40px; box-shadow: 12px 12px 0px var(--black);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 800; margin-bottom: 8px; font-size: 0.9rem; }
        input, select {
            width: 100%; padding: 12px; border: 2px solid var(--black); border-radius: 12px; font-size: 1rem;
            background-color: #fafafa;
        }
        input:focus, select:focus {
            outline: none; border-color: var(--purple); background-color: #ffffff;
        }
        .submit-btn {
            width: 100%; padding: 15px; background: var(--purple); color: white;
            border: 3px solid var(--black); border-radius: 15px; font-weight: 900; cursor: pointer;
            box-shadow: 4px 4px 0px var(--black); margin-top: 10px; font-size: 1rem;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .submit-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--black);
        }
        .submit-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--black);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <div style="background: var(--purple); width: 32px; height: 32px; border-radius: 8px; border: 2px solid black; display: flex; align-items: center; justify-content: center; color: white;">✦</div>
            Limitless Knowledge
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="counselors.html">Counselors</a></li>
            <li><a href="curriculum.html">Curriculum</a></li>
            <li><a href="schedule.html">Schedule</a></li>
            <li><a href="supplies.html">Supplies</a></li>
            <li><a href="enroll.html" class="enroll-nav-btn">Enroll</a></li>
        </ul>
    </nav>

    <div class="enroll-container">
        <div class="info-side">
            <h1 style="font-size: 3.5rem; font-weight: 900; line-height: 1;">Save your camper's spot.</h1>
            <p style="margin-top: 20px; font-size: 1.2rem;">Fill out the form and we'll follow up with a welcome packet and camp details!</p>
        </div>

        <div class="form-side">
            <form class="form-card" action="https://formspree.io/f/xykvawry" method="POST">
                
                <div class="form-group">
                    <label>Parent Name *</label>
                    <input type="text" name="parent_name" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label>Camper Name *</label>
                    <input type="text" name="camper_name" required>
                </div>
                
                <div class="form-group">
                    <label>Grade (Fall 2026) *</label>
                    <select name="camper_grade">
                        <option value="4th Grade">4th Grade</option>
                        <option value="5th Grade">5th Grade</option>
                        <option value="6th Grade">6th Grade</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">Submit Registration →</button>
            </form>
        </div>
    </div>

</body>
</html>
